<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
    
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f4f4f4; 
            font-family: 'Pretendard', sans-serif; 
            font-size: 12px; 
            color: #333; 
        }
        a { text-decoration: none; color: inherit; display: block; }

        /* 상단바 고정 설정 */
        .header { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 35px; 
            padding: 20px 20px 40px 20px; 
            position: sticky; 
            top: 0; 
            background-color: #f4f4f4; /* 배경색이 있어야 스크롤 시 겹치지 않음 */
            z-index: 1000;             /* 콘텐츠보다 위에 위치하도록 z-index 높임 */
            font-weight: 500;
            box-sizing: border-box;
            border-bottom: none; 
        }

        /* 헤더 하단 그라데이션 경계선 (헤더 내부의 가상 요소이므로 함께 고정됨) */
        .header::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 20px;
            right: 20px;
            height: 1px;
            background: linear-gradient(
                to right, 
                rgba(160, 160, 160, 0) 0%, 
                rgba(160, 160, 160, 1) 10%, 
                rgba(160, 160, 160, 1) 90%, 
                rgba(160, 160, 160, 0) 100%
            );
        }
        
        .sub-text { font-weight: 300; } 
        
        .header-left { display: grid; grid-template-columns: 1fr 1fr; align-items: center; }
        .header-right { display: grid; grid-template-columns: 1fr 1fr; align-items: start; position: relative; }

        .center-text { font-size: 16px; font-weight: 200; display: flex; align-items: center; }
        .logo-area { display: flex; align-items: flex-start; gap: 10px; }
        .logo-box { width: 25px; height: 25px; background-color: #000; margin-top: 2px; flex-shrink: 0; }

        .menu-wrapper { position: absolute; right: 0px; top: 2.5px; z-index: 1000; }
        .menu-btn { 
            width: 25px; height: 22px; cursor: pointer; margin-left: auto;
            display: flex; flex-direction: column; justify-content: space-between; padding: 2px; box-sizing: border-box;
        }
        .menu-btn span {
            display: block; width: 100%; height: 1.5px;
            background: linear-gradient(to right, rgba(0,0,0,0) 0%, rgba(0,0,0,1) 20%, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%);
        }

        .menu-list { 
            display: block; position: absolute; top: 30px; right: 0; background: #f4f4f4; 
            border: 1px solid #333; padding: 10px; text-align: right; white-space: nowrap;
            opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease;
        }
        .menu-wrapper:hover .menu-list, .menu-wrapper.active .menu-list { opacity: 1; visibility: visible; }
        .menu-list div { padding: 5px 0; cursor: pointer; }

        .main-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; padding: 0 20px 20px 20px; margin-top: 40px; }
        
        .content-fixed-section { position: sticky; top: 120px; }
        .content { position: relative; min-height: 400px; padding-bottom: 80px; }
        .scroll-arrow { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) rotate(45deg); width: 20px; height: 20px; border-bottom: 1.5px solid #333; border-right: 1.5px solid #333; }

        .image-container { margin-bottom: 20px; }
        .image-container img { width: 100%; display: block; }
        .content h3 { font-size: 11px; margin-top: 30px; margin-bottom: 10px; color: #888; text-transform: uppercase; }
        
        @media (max-width: 768px) {
            .header { grid-template-columns: 1fr; gap: 15px; }
            .header-right > div:not(.menu-wrapper) { display: none; }
            .main-wrapper { grid-template-columns: 1fr; }
            .content-fixed-section { position: static; }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="index.html" class="header-left">
            <div class="logo-area">
                <div class="logo-box"></div>
                <div><strong>MOK ARCHIVE</strong><br><span class="sub-text">architecture & interior</span></div>
            </div>
            <div><span class="center-text">Only What Matters</span></div>
        </a>
        <div class="header-right">
            <div><strong>LOCATION</strong><br><span class="sub-text">based in seoul</span></div>
            <div><strong>CONTACT</strong><br><span class="sub-text">wjdwoahr_@naver.com</span></div>
            
            <div class="menu-wrapper" id="menuWrapper">
                <div class="menu-btn" onclick="toggleMenu()">
                    <span></span><span></span><span></span>
                </div>
                <div class="menu-list">
                    <div>About</div><div>Project</div><div>Contact</div>
                </div>
            </div>
        </div>
    </header>

    <main class="main-wrapper">
        <div class="image-scroll-section">
            <div class="image-container"><img src="2.jpg" alt="Project"></div>
            <div class="image-container"><img src="your-image.jpg" alt="Project"></div>
            <div class="image-container"><img src="your-image.jpg" alt="Project"></div>
        </div>

        <div class="content-fixed-section">
            <div class="content">
                <h3>PROJECT</h3><p>Comfortemple</p>
                <h3>DESCRIPTION</h3><p>Eclipse explores the interplay between concealment and clarity.</p>
                <div class="scroll-arrow"></div>
            </div>
        </div>
    </main>

    <script>
        function toggleMenu() {
            document.getElementById('menuWrapper').classList.toggle('active');
        }
    </script>
</body>
</html>
