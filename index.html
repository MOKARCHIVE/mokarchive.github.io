<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MOK Portfolio</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 64px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
      color: #ccc;
    }

    .button {
      margin-top: 30px;
      padding: 14px 28px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
    }

    .button:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>
  <section class="hero">
    <h1>MOK</h1>
    <p>Design Portfolio</p>
    <a class="button" href="#">View Projects</a>
  </section>
</body>
</html>
